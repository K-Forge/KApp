<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>K-APP • Dashboard</title>
    <link rel="icon" href="images/konrad-logo.png" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/shell.css" />
    <link rel="stylesheet" href="css/layout.css" />
  </head>
  <body class="app-shell dashboard-page">
    
    <!-- Header Partial Inlined -->
    <header class="app-header" role="banner">
      <button id="btnMenu" class="icon-btn" aria-label="Abrir menú" aria-controls="drawer" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18v2H3V6m0 5h18v2H3v-2m0 5h18v2H3v-2z" fill="currentColor"/></svg>
      </button>
    
      <div class="header-center">
        <strong id="studentName">Estudiante</strong>
        <small id="studentCode">000000</small>
      </div>
    
      <a class="avatar" href="login.html" title="Ver perfil">
        <img id="studentAvatar" src="images/avatar-placeholder.svg" alt="Foto de perfil"/>
      </a>
    </header>
    
    <!-- Drawer & overlay -->
    <div class="drawer-overlay" id="drawerOverlay" hidden></div>
    <aside class="drawer" id="drawer" aria-hidden="true">
      <header class="drawer-header">
        <div class="drawer-user">
          <img id="drawerAvatar" src="images/avatar-placeholder.svg" alt="Avatar" />
          <div>
            <strong id="drawerName">Estudiante</strong>
            <small id="drawerCode">000000</small>
          </div>
        </div>
      </header>
      <nav class="drawer-nav" aria-label="Menú">
        <a href="#" class="drawer-link" data-action="perfil">Perfil</a>
        <a href="#" class="drawer-link" data-action="ajustes">Ajustes</a>
        <hr/>
        <button id="logoutBtn" class="drawer-link danger" type="button">Cerrar sesión</button>
      </nav>
    </aside>
    <!-- End Header Partial -->

    <main class="app-content" role="main">
      <!-- Carrusel de novedades -->
      <section class="card section-gap">
        <h2 class="section-title">Novedades</h2>
        <div class="carousel">
          <div class="carousel-track" data-autoplay="5000">
            <article class="slide is-active">
              <img src="images/news-1.svg" alt="Novedad 1"/>
              <div class="slide-caption">
                <h3>Becas y apoyos</h3>
                <p>Consulta las nuevas becas disponibles este semestre.</p>
              </div>
            </article>
            <article class="slide">
              <img src="images/news-2.svg" alt="Novedad 2"/>
              <div class="slide-caption">
                <h3>Clubes estudiantiles</h3>
                <p>Únete a un club y descubre nuevas experiencias.</p>
              </div>
            </article>
            <article class="slide">
              <img src="images/news-3.svg" alt="Novedad 3"/>
              <div class="slide-caption">
                <h3>Semana K</h3>
                <p>Agenda las actividades de la Semana Konrad Lorenz.</p>
              </div>
            </article>
          </div>
          <div class="carousel-controls" aria-hidden="false">
            <button class="carousel-btn" id="prevBtn" aria-label="Anterior">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button class="carousel-btn" id="nextBtn" aria-label="Siguiente">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="m10 6-1.41 1.41L13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
          </div>
        </div>
      </section>

      <!-- Accesos rápidos -->
      <section class="grid-menu section-gap">
        <a href="#" class="menu-item">
          <div class="icon-box blue">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg>
          </div>
          <span>Notas</span>
        </a>
        <a href="#" class="menu-item">
          <div class="icon-box green">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
          </div>
          <span>Horario</span>
        </a>
        <a href="#" class="menu-item">
          <div class="icon-box orange">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg>
          </div>
          <span>Inscribir</span>
        </a>
        <a href="#" class="menu-item">
          <div class="icon-box purple">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg>
          </div>
          <span>PQR</span>
        </a>
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
