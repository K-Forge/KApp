<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>KApp • Notas</title>
    <link rel="icon" href="images/konrad-logo.png" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/shell.css" />
    <link rel="stylesheet" href="css/layout.css" />
  </head>
  <body class="app-shell dashboard-page">
    
    <!-- Header Partial Inlined -->
    <header class="app-header" role="banner" style="position: relative;">
      <button id="btnMenu" class="icon-btn" aria-label="Abrir menú" aria-controls="drawer" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18v2H3V6m0 5h18v2H3v-2m0 5h18v2H3v-2z" fill="currentColor"/></svg>
      </button>

      <a href="dashboard.html" class="icon-btn" aria-label="Ir al inicio" style="display: flex; align-items: center; justify-content: center; text-decoration: none; color: inherit;">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 24px; height: 24px;"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/></svg>
      </a>

      <a class="avatar" href="login.html" title="Ver perfil">
        <img id="studentAvatar" src="images/avatar-placeholder.svg" alt="Foto de perfil"/>
      </a>
    
      <div class="header-center" style="position: absolute; left: 50%; transform: translateX(-50%); text-align: center;">
        <strong id="studentName">Estudiante</strong>
        <small id="studentCode">000000</small>
      </div>
    </header>
    
    <!-- Drawer & overlay -->
    <div class="drawer-overlay" id="drawerOverlay" hidden></div>
    <aside class="drawer" id="drawer" aria-hidden="true">
      <header class="drawer-header">
        <div class="drawer-user">
          <img id="drawerAvatar" src="images/avatar-placeholder.svg" alt="Avatar" />
          <div>
            <strong id="drawerName">Estudiante</strong>
            <small id="drawerCode">000000</small>
          </div>
        </div>
        <!-- Botón para cerrar el drawer -->
        <button id="btnCloseDrawer" class="icon-btn" aria-label="Cerrar menú" onclick="document.getElementById('drawerOverlay').click()" style="color: #5f6368;">
          <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 24px; height: 24px;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/></svg>
        </button>
      </header>
      <nav class="drawer-nav" aria-label="Menú">
        <a href="dashboard.html" class="drawer-link">Inicio</a>
        <a href="#" class="drawer-link" data-action="perfil">Perfil</a>
        <a href="#" class="drawer-link" data-action="ajustes">Ajustes</a>
        <hr/>
        <button id="logoutBtn" class="drawer-link danger" type="button">Cerrar sesión</button>
      </nav>
    </aside>
    <!-- End Header Partial -->

    <main class="app-content" role="main">
      <section class="card section-gap">
        <h2 class="section-title">Notas</h2>
        <p>Bienvenido a la sección de notas.</p>
        <div style="padding: 20px; text-align: center; color: #888;">
            <p>Aquí podrás consultar tus calificaciones.</p>
        </div>
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
