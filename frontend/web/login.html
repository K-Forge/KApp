<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>KApp • Iniciar sesión</title>
    <link rel="icon" href="images/konrad-logo.png" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/shell.css" />
    <link rel="stylesheet" href="css/layout.css" />
  </head>
  <body class="login-page">
    <main class="login-container" role="main">
      <header class="login-header">
        <img class="login-logo" src="images/konrad-logo.png" alt="Logo Universidad Konrad Lorenz"/>
        <h1 class="login-title">KApp</h1>
        <p class="login-subtitle">Portal estudiante</p>
      </header>

      <form class="login-form" id="loginForm">
        <label class="input-group">
          <span>Código o Correo Institucional</span>
          <input type="text" name="email" id="email" placeholder="Código o usuario@konradlorenz.edu.co" required />
        </label>
        <label class="input-group">
          <span>Contraseña</span>
          <input type="password" name="password" id="password" placeholder="••••••••" required />
        </label>
        <label class="checkbox">
          <input type="checkbox" id="remember" name="remember" />
          <span>Recordar sesión</span>
        </label>
        <button class="btn primary" type="submit" id="loginBtn">Ingresar</button>
        <p id="error-msg" style="color: red; text-align: center; display: none; margin-top: 10px;">Credenciales inválidas</p>
      </form>

      <footer class="login-footer">
        <small>© <span id="year"></span> Fundación Universitaria Konrad Lorenz</small>
      </footer>
    </main>

    <script>
      const API_URL = 'http://localhost:8080/auth/login';

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        let email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('error-msg');

        // Si no tiene @, asumimos que es un código/usuario y agregamos el dominio
        if (!email.includes('@')) {
            email = email + '@konradlorenz.edu.co';
        }

        btn.disabled = true;
        btn.textContent = 'Ingresando...';
        errorMsg.style.display = 'none';

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          if (!response.ok) throw new Error('Login failed');

          const data = await response.json();
          
          // Guardar sesión
          const sessionData = JSON.stringify(data);
          if (remember) {
            localStorage.setItem('user_session', sessionData);
          } else {
            sessionStorage.setItem('user_session', sessionData);
          }

          window.location.href = 'dashboard.html';

        } catch (error) {
          console.error(error);
          if (error.message === 'Login failed') {
             errorMsg.textContent = 'Credenciales inválidas';
          } else {
             errorMsg.textContent = 'Error de conexión con el servidor';
          }
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      });

      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
